spring:
  application:
    name: a06

  #H2 en memoria
  datasource:
    url: jdbc:h2:mem:cruddb
    driverClassName: org.h2.Driver
    username: sa
    password:
  
  # JPA /Hibernate
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
      format_sql: true
  
  # Consola H2
  h2:
    console:
      enabled: true
      path: /h2-console
